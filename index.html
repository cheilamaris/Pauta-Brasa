<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda de Operação — Brasa Marketing</title>
<style>
:root {
  --br:#FF5500;--br-dim:rgba(255,85,0,0.1);--br-bdr:rgba(255,85,0,0.28);
  --bg1:#ffffff;--bg2:#f7f7f4;--bg3:#efefeb;
  --tx1:#111110;--tx2:#666560;--tx3:#99988f;
  --bd3:rgba(0,0,0,0.10);--bd2:rgba(0,0,0,0.18);--bd1:rgba(0,0,0,0.28);
  --danger:#c83232;--info:#1a5fbf;
  --r1:8px;--r2:12px;
  --font:system-ui,-apple-system,'Segoe UI',sans-serif;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg1:#1c1c19;--bg2:#242421;--bg3:#2e2e2a;
    --tx1:#f0ede8;--tx2:#aaa89e;--tx3:#77756e;
    --bd3:rgba(255,255,255,0.08);--bd2:rgba(255,255,255,0.15);--bd1:rgba(255,255,255,0.25);
  }
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg3);font-family:var(--font);color:var(--tx1)}
#app{max-width:1600px;margin:0 auto;background:var(--bg1);border:0.5px solid var(--bd3);border-radius:var(--r2);overflow:hidden;min-height:100vh;display:flex;flex-direction:column;position:relative}
/* Header */
.hdr{background:var(--bg2);border-bottom:0.5px solid var(--bd3);padding:10px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0}
.logo{font-size:15px;font-weight:600;color:var(--br);letter-spacing:2px}
.logo-sub{font-size:9px;color:var(--tx3);letter-spacing:1.5px;text-transform:uppercase;margin-left:6px;font-weight:400}
.magic-pill{background:var(--br-dim);border:0.5px solid var(--br-bdr);color:var(--br);border-radius:100px;padding:3px 10px;font-size:10px;font-weight:500;display:inline-flex;align-items:center;gap:5px}
.cycle-nav{display:flex;align-items:center;gap:5px;margin-left:auto}
.cnav-btn{background:var(--bg3);border:0.5px solid var(--bd2);color:var(--tx2);border-radius:var(--r1);padding:4px 9px;cursor:pointer;font-size:12px;font-family:var(--font)}
.cnav-btn:hover{background:var(--bg2)}
.cycle-lbl{font-size:11px;font-weight:500;color:var(--tx1);min-width:110px;text-align:center}
.vtabs{display:flex;gap:2px;background:var(--bg3);border-radius:var(--r1);padding:2px}
.vt{background:transparent;border:none;color:var(--tx3);border-radius:calc(var(--r1) - 2px);padding:4px 11px;cursor:pointer;font-size:11px;font-weight:500;font-family:var(--font);white-space:nowrap}
.vt.on{background:var(--bg1);color:var(--br);box-shadow:0 0 0 0.5px var(--br-bdr)}
.hbtn{border:none;border-radius:var(--r1);padding:5px 12px;font-size:11px;font-weight:500;cursor:pointer;font-family:var(--font)}
.hbtn.pri{background:var(--br);color:#fff}
.hbtn.pri:hover{background:#e04b00}
.hbtn.sec{background:transparent;color:var(--tx2);border:0.5px solid var(--bd2)}
.hbtn.sec:hover{background:var(--bg2)}
/* Legend */
.legbar{background:var(--bg3);border-bottom:0.5px solid var(--bd3);padding:5px 16px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;flex-shrink:0}
.li{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--tx2)}
.ldot{width:7px;height:7px;border-radius:2px;flex-shrink:0}
/* Filters */
.filterbar{padding:7px 16px;display:flex;gap:5px;flex-wrap:wrap;border-bottom:0.5px solid var(--bd3);background:var(--bg1);flex-shrink:0}
.fc{background:transparent;border:0.5px solid var(--bd3);color:var(--tx3);border-radius:100px;padding:3px 10px;cursor:pointer;font-size:10px;font-family:var(--font)}
.fc.on{background:var(--br-dim);color:var(--br);border-color:var(--br-bdr)}
/* Table */
.tbl-outer{overflow:auto;flex:1}
table{border-collapse:collapse;font-size:11px}
th{background:var(--bg2);border:0.5px solid var(--bd3);padding:5px 3px;text-align:center;color:var(--tx2);font-weight:500;position:sticky;top:0;z-index:6;white-space:nowrap}
th.sc{position:sticky;left:0;z-index:11;text-align:left;padding:5px 10px;min-width:132px}
th.wknd{background:var(--bg3) !important;color:var(--tx3) !important}
td{border:0.5px solid var(--bd3);padding:2px;vertical-align:top}
td.sc{position:sticky;left:0;background:var(--bg1);z-index:4;padding:5px 10px}
td.wknd{background:var(--bg3) !important;opacity:0.55}
tr:nth-child(even) td.sc{background:var(--bg2)}
tr:nth-child(even) td{background:rgba(0,0,0,0.012)}
tr:nth-child(even) td.wknd{background:var(--bg3) !important}
.mwrap{display:flex;align-items:center;gap:7px;min-width:120px}
.av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:#fff;flex-shrink:0}
.mn{font-size:10px;font-weight:500;color:var(--tx1);line-height:1.2}
.mr{font-size:8px;color:var(--tx3)}
.chip{border-left:2px solid;border-radius:0 3px 3px 0;padding:2px 4px;margin-bottom:2px;cursor:pointer;display:block;transition:opacity 0.1s;min-height:24px}
.chip:hover{opacity:0.72}
.chip.done{opacity:0.3}
.chip.done .cc{text-decoration:line-through}
.cs{font-size:8px;font-weight:500;text-transform:uppercase;letter-spacing:0.3px;line-height:1.3}
.cc{font-size:10px;color:var(--tx1);line-height:1.3}
.ch{font-size:8px;color:var(--tx3)}
.dcell{min-height:42px;min-width:68px}
.dhead{font-size:12px;font-weight:500;color:var(--tx1);line-height:1}
.ddow{font-size:8px;color:var(--tx3);text-transform:uppercase}
.dmg .dhead{color:var(--br);font-weight:700;font-size:15px}
.dmg .ddow{color:var(--br)}
.dmgl{font-size:9px;color:var(--br);font-weight:700;letter-spacing:0.5px}
.mth{background:rgba(255,85,0,0.13) !important;border-left:2px solid rgba(255,85,0,0.5) !important;border-right:2px solid rgba(255,85,0,0.5) !important}
.mth-b{border-bottom:3px solid var(--br) !important;background:rgba(255,85,0,0.18) !important}
.sep-th{background:var(--bg3) !important;color:var(--tx3) !important;font-size:9px !important;padding:2px 4px !important}
/* Week tabs */
.week-tabs{display:flex;gap:4px;padding:7px 16px;border-bottom:0.5px solid var(--bd3);flex-shrink:0;overflow-x:auto}
.wt{background:var(--bg2);border:0.5px solid var(--bd3);color:var(--tx2);border-radius:var(--r1);padding:4px 11px;cursor:pointer;font-size:10px;font-weight:500;white-space:nowrap;font-family:var(--font)}
.wt.on{background:var(--br-dim);color:var(--br);border-color:var(--br-bdr)}
/* Professional view */
.pro-sel{padding:10px 16px;display:flex;gap:6px;border-bottom:0.5px solid var(--bd3);flex-wrap:wrap;flex-shrink:0;overflow-x:auto}
.pavbtn{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:5px 8px;border-radius:var(--r1);border:0.5px solid transparent;background:transparent;font-family:var(--font)}
.pavbtn.on{background:var(--br-dim);border-color:var(--br-bdr)}
.pavbtn .av{width:30px;height:30px;font-size:10px}
.pavname{font-size:8px;color:var(--tx2);text-align:center;max-width:52px;line-height:1.2}
.pavbtn.on .pavname{color:var(--br)}
.cl-wrap{padding:16px;flex:1;overflow-y:auto;max-width:600px}
.cl-datenav{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.cl-datelbl{font-size:14px;font-weight:500;color:var(--tx1)}
.cl-summary{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.cl-pill{background:var(--bg2);border:0.5px solid var(--bd3);border-radius:100px;padding:3px 10px;font-size:10px;color:var(--tx2)}
.cl-item{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;border:0.5px solid var(--bd3);border-radius:var(--r2);margin-bottom:8px;cursor:pointer;background:var(--bg1);transition:opacity 0.15s}
.cl-item:hover{background:var(--bg2)}
.cl-item.done{opacity:0.38;background:var(--bg3)}
.cl-item.done .cl-client{text-decoration:line-through;color:var(--tx3)}
.chkbox{width:19px;height:19px;border-radius:4px;border:0.5px solid var(--bd2);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.chkbox.ck{background:var(--br);border-color:var(--br)}
.cl-stage{font-size:8px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px}
.cl-client{font-size:13px;font-weight:500;color:var(--tx1);line-height:1.3}
.cl-note{font-size:11px;color:var(--tx2);margin-top:3px}
.cl-h{font-size:9px;color:var(--tx3);margin-top:2px}
.notasks{text-align:center;padding:48px;color:var(--tx3);font-size:13px;line-height:1.7}
.wknd-msg{text-align:center;padding:48px;color:var(--tx3);font-size:13px;line-height:1.7}
/* Detail panel */
.dpanel{background:var(--bg2);border-top:0.5px solid var(--bd3);padding:10px 16px;display:none;gap:10px;flex-wrap:wrap;align-items:center;flex-shrink:0}
.dpanel.show{display:flex}
.dpf{flex:1;min-width:80px}
.dplbl{font-size:8px;color:var(--tx3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px}
.dpv{font-size:11px;font-weight:500;color:var(--tx1)}
.rmbtn{background:transparent;border:0.5px solid var(--danger);color:var(--danger);border-radius:var(--r1);padding:5px 10px;font-size:9px;cursor:pointer;font-family:var(--font)}
.tdone-btn{background:transparent;border:0.5px solid var(--bd2);color:var(--tx2);border-radius:var(--r1);padding:5px 10px;font-size:9px;cursor:pointer;font-family:var(--font)}
/* Modal */
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;z-index:100}
.mbox{background:var(--bg1);border:0.5px solid var(--bd2);border-radius:var(--r2);padding:20px;width:340px;max-height:88vh;overflow-y:auto}
.mtitle{font-size:13px;font-weight:500;color:var(--tx1);margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.xbtn{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:18px;font-family:var(--font)}
.fg{margin-bottom:12px}
.fg label,.flabel{font-size:9px;font-weight:500;color:var(--tx2);text-transform:uppercase;letter-spacing:0.4px;display:block;margin-bottom:4px}
select,input[type=text],input[type=date],input[type=number]{width:100%;background:var(--bg2);border:0.5px solid var(--bd2);border-radius:var(--r1);padding:7px 10px;font-size:13px;color:var(--tx1);outline:none;font-family:var(--font)}
select:focus,input:focus{border-color:var(--br)}
.hrs-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:4px}
.hrs-opt{border:0.5px solid var(--bd2);border-radius:var(--r1);padding:6px 3px;text-align:center;cursor:pointer;font-size:10px;color:var(--tx2);font-family:var(--font);background:var(--bg2)}
.hrs-opt.on{background:var(--br-dim);color:var(--br);border-color:var(--br-bdr)}
.ref-box{background:var(--bg3);border:0.5px solid var(--bd3);border-radius:var(--r1);padding:12px;margin-bottom:10px}
.ref-row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:0.5px solid var(--bd3)}
.ref-row:last-child{border-bottom:none}
.ref-svc{font-size:11px;color:var(--tx1)}
.ref-time{font-size:10px;color:var(--br);font-weight:500;flex-shrink:0;margin-left:10px}
</style>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>
<div id="app">
  <div class="hdr">
    <span class="logo">BRASA<span class="logo-sub">Agenda de Operação</span></span>
    <div class="magic-pill">🎯 Magic: <strong id="magic-day">—</strong></div>
    <div class="cycle-nav">
      <button class="cnav-btn" onclick="changeCycle(-1)">‹</button>
      <span class="cycle-lbl" id="cycle-lbl">—</span>
      <button class="cnav-btn" onclick="changeCycle(1)">›</button>
    </div>
    <div class="vtabs">
      <button class="vt" id="vt-ciclo" onclick="setView('ciclo')">Ciclo</button>
      <button class="vt" id="vt-semana" onclick="setView('semana')">Semana</button>
      <button class="vt" id="vt-pro" onclick="setView('profissional')">Profissional</button>
    </div>
    <button class="hbtn pri" onclick="openModal('task')">+ Tarefa</button>
    <button class="hbtn sec" onclick="openModal('client')">+ Cliente</button>
    <button class="hbtn sec" onclick="openModal('tempos')">Tempos</button>
  </div>
  <div class="legbar" id="legbar"></div>
  <div id="view-root"></div>
  <div class="dpanel" id="dpanel">
    <div class="dpf"><div class="dplbl">Cliente</div><div class="dpv" id="dp-cl">—</div></div>
    <div class="dpf"><div class="dplbl">Etapa</div><div class="dpv" id="dp-st">—</div></div>
    <div class="dpf"><div class="dplbl">Profissional</div><div class="dpv" id="dp-mb">—</div></div>
    <div class="dpf"><div class="dplbl">Data</div><div class="dpv" id="dp-dt">—</div></div>
    <div class="dpf"><div class="dplbl">Horas</div><div class="dpv" id="dp-hr">—</div></div>
    <div class="dpf" style="flex:2"><div class="dplbl">Obs</div><div class="dpv" id="dp-nt" style="font-weight:400;font-size:10px">—</div></div>
    <button class="tdone-btn" id="tdone-btn" onclick="toggleDoneSelected()">Concluir</button>
    <button class="rmbtn" onclick="removeSelected()">Remover</button>
  </div>
</div>
<!-- Modal container (outside #app so fixed positioning works) -->
<div id="modal-host"></div>

<script>
const STAGES=[
  {id:'plan_captacao',label:'Plan. Captação',color:'#C85000'},
  {id:'captacao',label:'Captação',color:'#8B2000'},
  {id:'planejamento',label:'Planejamento',color:'#9A6200'},
  {id:'design_video',label:'Design Vídeo',color:'#4A2FA0'},
  {id:'design_estatico',label:'Design Est.',color:'#0E5EA0'},
  {id:'revisao',label:'Revisão',color:'#127045'},
  {id:'aprovacao',label:'Aprova.Aí',color:'#0A6878'},
  {id:'ajustes',label:'Ajustes',color:'#7A4A00'},
  {id:'agendamento',label:'Agendamento',color:'#2A6020'},
  {id:'reuniao',label:'Reunião',color:'#8A1530'},
  {id:'extra',label:'Extra/Avulso',color:'#582A88'},
];
const TEAM=[
  {id:'gabrieli',name:'Gabrieli Goulart',initials:'GG',color:'#C85000',roles:['planejamento','captacao','design_video']},
  {id:'eloisa',name:'Eloisa Zamin',initials:'EZ',color:'#9A6200',roles:['planejamento','captacao','design_video']},
  {id:'willian',name:'Willian Sant\'Helena',initials:'WS',color:'#8B2000',roles:['captacao','design_video']},
  {id:'lucas',name:'Lucas Abentroth',initials:'LA',color:'#4A2FA0',roles:['captacao','design_video']},
  {id:'nikely',name:'Nikely Schütz',initials:'NS',color:'#0E5EA0',roles:['design_estatico']},
  {id:'robson',name:'Robson dos Santos',initials:'RS',color:'#0A6878',roles:['design_estatico']},
  {id:'hendrio',name:'Hendrio Ferreira',initials:'HF',color:'#127045',roles:['design_estatico']},
  {id:'francieli',name:'Francieli Schmidt',initials:'FS',color:'#582A88',roles:['trafego']},
  {id:'thierry',name:'Thierry Silva',initials:'TS',color:'#7A4A00',roles:['trafego']},
  {id:'felipe',name:'Felipe Hoerle',initials:'FH',color:'#8A1530',roles:['trafego']},
  {id:'camila',name:'Camila Camargo',initials:'CC',color:'#1A3A8A',roles:['revisao','captacao']},
  {id:'cheila',name:'Cheila Maris',initials:'CM',color:'#5A5A5A',roles:[]},
];
const CONTRACT_TYPES={
  assessoria_global:{label:'Assessoria Global'},
  social_media_full:{label:'Social Media Full'},
  social_media_basico:{label:'Social Media Básico'},
  trafego:{label:'Tráfego'},
  avulso:{label:'Pedido Avulso'},
};
const TIME_REF=[
  {svc:'Brand Design',detail:'Meio turno plan. → 2 dias designer',total:'2,5 dias'},
  {svc:'Social Media 2×/sem, sem captação',detail:'½ plan. + ½ design est. + ½ vídeo',total:'1,5 dias'},
  {svc:'Social Media com captação',detail:'½ plan. captação + captação contratada + plan. integral',total:'Variável'},
  {svc:'Tráfego',detail:'Otimização semanal por marca',total:'2h – 4h/sem'},
  {svc:'1 Reel',detail:'45min editor + 15min planejamento',total:'1h'},
];
const MONTHS=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DOWS=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const DOWFULL=['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];

// ── STATE ──────────────────────────────────────────────────────────────────
let state={
  cycleYear:2026,cycleMonth:4,view:'ciclo',selWeek:0,
  selMemberId:'gabrieli',proDate:fmtDate(new Date()),
  filterMember:'all',selTask:null,addHours:4,
  clients:[],
  tasks:[]
};

// ── UTILS ──────────────────────────────────────────────────────────────────
function fmtDate(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function fmtShort(s){if(!s)return'—';const[y,m,d]=s.split('-');return`${d}/${m}`}
function isWknd(dw){return dw===0||dw===6}

function getMagic(y,m){
  let c=0,d=new Date(y,m+1,0).getDate();
  while(c<5){const dw=new Date(y,m,d).getDay();if(!isWknd(dw))c++;if(c<5)d--;}
  return d;
}

function getCycleDays(y,m){
  const endDay=getMagic(y,m);
  const endDt=new Date(y,m,endDay);
  let pm=m-1,py=y;if(pm<0){pm=11;py--;}
  const prevMg=getMagic(py,pm);
  let startDt=new Date(py,pm,prevMg+1);
  const sd=startDt.getDay();
  startDt.setDate(startDt.getDate()-(sd===0?6:sd-1));
  let endDsp=new Date(endDt);
  const ed=endDsp.getDay();
  endDsp.setDate(endDsp.getDate()+(ed===0?0:7-ed));
  const days=[];const cur=new Date(startDt);
  const cycleStart=new Date(py,pm,prevMg+1);
  while(cur<=endDsp){
    const dw=cur.getDay();
    days.push({d:cur.getDate(),mo:cur.getMonth(),yr:cur.getFullYear(),dw,date:fmtDate(new Date(cur)),isWeekend:isWknd(dw),inCycle:cur>=cycleStart&&cur<=endDt});
    cur.setDate(cur.getDate()+1);
  }
  return days;
}

function groupWeeks(days){
  const wks=[];let w=[];
  days.forEach(day=>{if(day.dw===1&&w.length>0){wks.push(w);w=[];}w.push(day);});
  if(w.length)wks.push(w);
  return wks;
}

function nextDay(s,skipWknd){
  const d=new Date(s+'T12:00:00');
  do{d.setDate(d.getDate()+1);}while(skipWknd&&isWknd(d.getDay()));
  return fmtDate(d);
}
function prevDay(s,skipWknd){
  const d=new Date(s+'T12:00:00');
  do{d.setDate(d.getDate()-1);}while(skipWknd&&isWknd(d.getDay()));
  return fmtDate(d);
}

function getStage(id){return STAGES.find(s=>s.id===id)||{label:id,color:'#888'}}
function getClient(id){return state.clients.find(c=>c.id===id)||{name:id||'Geral'}}
function getMember(id){return TEAM.find(m=>m.id===id)||{name:id,initials:'?',color:'#888'}}
function tasksByMD(mid,date){return state.tasks.filter(t=>t.memberId===mid&&t.date===date)}

// ── RENDER ─────────────────────────────────────────────────────────────────
function renderLegend(){
  document.getElementById('legbar').innerHTML=
    '<span style="font-size:9px;color:var(--tx3);font-weight:500;flex-shrink:0">Etapas:</span>'+
    STAGES.map(s=>`<div class="li"><div class="ldot" style="background:${s.color}"></div>${s.label}</div>`).join('');
}

function renderHeader(){
  const magic=getMagic(state.cycleYear,state.cycleMonth);
  document.getElementById('magic-day').textContent=`${magic}/${String(state.cycleMonth+1).padStart(2,'0')}`;
  document.getElementById('cycle-lbl').textContent=`${MONTHS[state.cycleMonth].slice(0,3)} ${state.cycleYear}`;
  ['ciclo','semana','pro'].forEach(v=>document.getElementById('vt-'+v).className='vt'+(state.view===(v==='pro'?'profissional':v)?' on':''));
}

function renderFilters(){
  return`<div class="filterbar">
    <button class="fc${state.filterMember==='all'?' on':''}" onclick="setFilter('all')">Todos</button>
    ${TEAM.map(m=>`<button class="fc${state.filterMember===m.id?' on':''}" onclick="setFilter('${m.id}')">${m.name.split(' ')[0]}</button>`).join('')}
  </div>`;
}
function setFilter(id){state.filterMember=id;renderView();}

function renderGrid(days){
  const members=state.filterMember==='all'?TEAM:TEAM.filter(m=>m.id===state.filterMember);
  const magic=getMagic(state.cycleYear,state.cycleMonth);
  const magicDate=`${state.cycleYear}-${String(state.cycleMonth+1).padStart(2,'0')}-${String(magic).padStart(2,'0')}`;
  const moSpans=[];let cmo=-1,cspan=0;
  days.forEach(col=>{if(col.mo!==cmo){if(cspan>0)moSpans.push({mo:cmo,count:cspan});cmo=col.mo;cspan=1;}else cspan++;});
  if(cspan>0)moSpans.push({mo:cmo,count:cspan});
  const weekStarts=new Set();
  days.forEach((d,i)=>{if(i>0&&d.dw===1)weekStarts.add(i);});
  let html=`<div class="tbl-outer"><table style="min-width:${132+days.length*72}px"><thead>`;
  html+=`<tr><th class="sc"></th>${moSpans.map(ms=>`<th colspan="${ms.count}" class="sep-th">${MONTHS[ms.mo].toUpperCase().slice(0,3)}</th>`).join('')}</tr>`;
  html+=`<tr><th class="sc">Profissional</th>`;
  days.forEach((col,i)=>{
    const mg=col.date===magicDate,wk=col.isWeekend,ws=weekStarts.has(i);
    html+=`<th class="${wk?'wknd':''}${mg?' mth mth-b':''}" style="min-width:72px;padding:4px 2px${ws?';border-left:2px solid var(--bd2)':''}">
      <div class="${mg?'dmg':''}">
        <div class="ddow">${DOWS[col.dw]}</div>
        <div class="dhead" style="${wk?'opacity:0.45':''}">${col.d}</div>
        ${mg?'<div class="dmgl">🎯</div>':''}
      </div></th>`;
  });
  html+=`</tr></thead><tbody>`;
  members.forEach(mem=>{
    html+=`<tr><td class="sc"><div class="mwrap"><div class="av" style="background:${mem.color}">${mem.initials}</div><div><div class="mn">${mem.name.split(' ').slice(0,2).join(' ')}</div><div class="mr">${mem.roles.slice(0,2).map(r=>r.replace('_',' ')).join(', ')||'—'}</div></div></div></td>`;
    days.forEach((col,i)=>{
      const tasks=tasksByMD(mem.id,col.date);
      const mg=col.date===magicDate,wk=col.isWeekend,ws=weekStarts.has(i);
      const activeH=tasks.filter(t=>!t.completed).reduce((s,t)=>s+t.hours,0);
      const overloaded=!wk&&activeH>8;
      html+=`<td class="${wk?'wknd':''}${mg?' mth':''}" style="padding:2px;vertical-align:top${ws?';border-left:2px solid var(--bd2)':''}${overloaded?';outline:1px solid rgba(200,50,50,0.45)':''}"><div class="dcell">`;
      tasks.forEach(t=>{
        const sg=getStage(t.stage);const cl=getClient(t.clientId);
        const sel=state.selTask&&state.selTask.id===t.id;
        html+=`<div class="chip${t.completed?' done':''}" style="background:${sg.color}${sel?'2e':'14'};border-left-color:${sg.color}${sel?';outline:1px solid '+sg.color:''}" onclick="selectTask('${t.id}')">
          <div class="cs" style="color:${sg.color}">${sg.label}</div>
          <div class="cc">${t.isGeneral?(t.label||'Geral'):cl.name}</div>
          <div class="ch">${t.hours<1?Math.round(t.hours*60)+'min':t.hours+'h'}</div>
        </div>`;
      });
      if(overloaded)html+=`<div style="font-size:8px;color:var(--danger);padding:1px 2px">⚠ ${activeH}h</div>`;
      html+=`</div></td>`;
    });
    html+=`</tr>`;
  });
  html+=`</tbody></table></div>`;
  return html;
}

function renderWeekTabs(weeks){
  return`<div class="week-tabs">${weeks.map((w,i)=>{
    const mon=w.find(d=>d.dw===1)||w[0],fri=w.find(d=>d.dw===5)||w[w.length-1];
    return`<button class="wt${state.selWeek===i?' on':''}" onclick="selWeek(${i})">${mon.d}/${String(mon.mo+1).padStart(2,'0')} – ${fri.d}/${String(fri.mo+1).padStart(2,'0')}</button>`;
  }).join('')}</div>`;
}
function selWeek(i){state.selWeek=i;renderView();}

function renderPro(){
  const sel=state.selMemberId,member=getMember(sel),dateStr=state.proDate;
  const curDate=new Date(dateStr+'T12:00:00'),dw=curDate.getDay(),wknd=isWknd(dw);
  const dayTasks=state.tasks.filter(t=>t.memberId===sel&&t.date===dateStr).sort((a,b)=>{
    const ord=['plan_captacao','captacao','planejamento','design_video','design_estatico','revisao','aprovacao','ajustes','agendamento','reuniao','extra'];
    return ord.indexOf(a.stage)-ord.indexOf(b.stage);
  });
  const totalH=dayTasks.reduce((s,t)=>s+t.hours,0);
  const doneH=dayTasks.filter(t=>t.completed).reduce((s,t)=>s+t.hours,0);
  let html=`<div class="pro-sel">${TEAM.map(m=>`<button class="pavbtn${sel===m.id?' on':''}" onclick="selPro('${m.id}')"><div class="av" style="background:${m.color}">${m.initials}</div><div class="pavname">${m.name.split(' ')[0]}</div></button>`).join('')}</div>`;
  html+=`<div class="cl-wrap">
    <div class="cl-datenav">
      <button class="cnav-btn" onclick="moveProDate('${prevDay(dateStr,false)}')">‹</button>
      <span class="cl-datelbl">${DOWFULL[dw]}, ${curDate.getDate()} de ${MONTHS[curDate.getMonth()]}</span>
      <button class="cnav-btn" onclick="moveProDate('${nextDay(dateStr,false)}')">›</button>
    </div>
    <div class="cl-summary">
      <span class="cl-pill" style="background:var(--br-dim);color:var(--br);border-color:var(--br-bdr)">${member.name.split(' ').slice(0,2).join(' ')}</span>
      ${!wknd?`<span class="cl-pill">${dayTasks.length} ${dayTasks.length===1?'tarefa':'tarefas'}</span><span class="cl-pill">${totalH}h previstas</span>${doneH>0?`<span class="cl-pill">${doneH}h concluídas</span>`:''}`:``}
    </div>`;
  if(wknd&&dayTasks.length===0){
    html+=`<div class="wknd-msg">Fim de semana — sem tarefas agendadas 🌿<br><span style="font-size:11px">Tarefas manuais podem ser adicionadas se necessário</span></div>`;
  } else if(!wknd&&dayTasks.length===0){
    html+=`<div class="notasks">Nenhuma tarefa para este dia 🙌<br><span style="font-size:11px">Use + Tarefa para adicionar</span></div>`;
  }
  dayTasks.forEach(t=>{
    const sg=getStage(t.stage),cl=getClient(t.clientId);
    html+=`<div class="cl-item${t.completed?' done':''}" onclick="toggleTask('${t.id}')">
      <div class="chkbox${t.completed?' ck':''}">
        ${t.completed?'<svg width="10" height="10" viewBox="0 0 10 10"><polyline points="1.5,5 4,7.5 8.5,2" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}
      </div>
      <div style="flex:1">
        <div class="cl-stage" style="color:${sg.color}">${sg.label}</div>
        <div class="cl-client">${t.isGeneral?(t.label||'Geral'):cl.name}</div>
        ${t.note?`<div class="cl-note">${t.note}</div>`:''}
        <div class="cl-h">${t.hours<1?Math.round(t.hours*60)+'min':t.hours+'h'}</div>
      </div>
    </div>`;
  });
  html+=`</div>`;
  return html;
}
function selPro(id){state.selMemberId=id;renderView();}
function moveProDate(d){state.proDate=d;renderView();}

function toggleTask(id){
  const t=state.tasks.find(t=>t.id===id);
  if(t){t.completed=!t.completed;if(state.selTask&&state.selTask.id===id)state.selTask=t;}
  renderDetailPanel();saveToFirebase();
}
function selectTask(id){
  const t=state.tasks.find(t=>t.id===id);
  state.selTask=(state.selTask&&state.selTask.id===id)?null:(t||null);
  renderDetailPanel();renderView();
}
function renderDetailPanel(){
  const panel=document.getElementById('dpanel'),t=state.selTask;
  if(!t){panel.className='dpanel';return;}
  panel.className='dpanel show';
  const sg=getStage(t.stage),cl=getClient(t.clientId),mb=getMember(t.memberId);
  document.getElementById('dp-cl').textContent=t.isGeneral?(t.label||'Geral'):cl.name;
  document.getElementById('dp-st').textContent=sg.label;
  document.getElementById('dp-st').style.color=sg.color;
  document.getElementById('dp-mb').textContent=mb.name.split(' ').slice(0,2).join(' ');
  document.getElementById('dp-dt').textContent=fmtShort(t.date);
  document.getElementById('dp-hr').textContent=t.hours<1?Math.round(t.hours*60)+'min':t.hours+'h';
  document.getElementById('dp-nt').textContent=t.note||'—';
  document.getElementById('tdone-btn').textContent=t.completed?'Reabrir':'Concluir';
}
function toggleDoneSelected(){if(state.selTask)toggleTask(state.selTask.id);}
function removeSelected(){
  if(!state.selTask)return;
  state.tasks=state.tasks.filter(t=>t.id!==state.selTask.id);
  state.selTask=null;renderDetailPanel();saveToFirebase();
}

function renderView(){
  renderHeader();
  const allDays=getCycleDays(state.cycleYear,state.cycleMonth);
  const weeks=groupWeeks(allDays);
  const root=document.getElementById('view-root');
  let html='';
  if(state.view==='ciclo'){
    html=renderFilters()+renderGrid(allDays);
  } else if(state.view==='semana'){
    if(state.selWeek>=weeks.length)state.selWeek=0;
    html=renderFilters()+renderWeekTabs(weeks)+renderGrid(weeks[state.selWeek]||weeks[0]||[]);
  } else {
    html=renderPro();
  }
  root.innerHTML=html;
}

function setView(v){state.view=v;state.selTask=null;renderDetailPanel();renderView();}
function changeCycle(d){
  state.cycleMonth+=d;
  if(state.cycleMonth<0){state.cycleMonth=11;state.cycleYear--;}
  if(state.cycleMonth>11){state.cycleMonth=0;state.cycleYear++;}
  renderView();
}

// ── MODALS ─────────────────────────────────────────────────────────────────
function openModal(type){
  closeModal();
  const host=document.getElementById('modal-host');
  const ov=document.createElement('div');ov.className='ov';ov.id='modal-ov';
  let inner='';
  if(type==='task'){
    const cOpts=state.clients.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
    const sOpts=STAGES.map(s=>`<option value="${s.id}">${s.label}</option>`).join('');
    const mOpts=TEAM.map(m=>`<option value="${m.id}">${m.name}</option>`).join('');
    const hOpts=[0.25,0.5,1,2,4,8,16].map(h=>`<div class="hrs-opt${state.addHours===h?' on':''}" onclick="setHrs(${h})">${h<1?Math.round(h*60)+'min':h===8?'1 dia':h===16?'2 dias':h+'h'}</div>`).join('');
    inner=`<div class="mbox"><div class="mtitle">Nova Tarefa <button class="xbtn" onclick="closeModal()">×</button></div>
      <div class="fg"><label>Cliente</label><select id="f-cl"><option value="">Selecione...</option>${cOpts}</select></div>
      <div class="fg"><label>Etapa</label><select id="f-st"><option value="">Selecione...</option>${sOpts}</select></div>
      <div class="fg"><label>Profissional</label><select id="f-mb"><option value="">Selecione...</option>${mOpts}</select></div>
      <div class="fg"><label>Data</label><input type="date" id="f-dt"></div>
      <div class="fg"><div class="flabel">Duração</div><div class="hrs-grid">${hOpts}</div></div>
      <div class="fg"><label>Observação</label><input type="text" id="f-nt" placeholder="Ex: [PLAN] Prisma – Social Media"></div>
      <button class="hbtn pri" style="width:100%;padding:10px;margin-top:6px" onclick="submitTask()">Adicionar Tarefa</button>
    </div>`;
  } else if(type==='client'){
    const ctOpts=Object.entries(CONTRACT_TYPES).map(([k,v])=>`<option value="${k}">${v.label}</option>`).join('');
    inner=`<div class="mbox"><div class="mtitle">Novo Cliente <button class="xbtn" onclick="closeModal()">×</button></div>
      <div class="fg"><label>Nome</label><input type="text" id="f-cn" placeholder="Ex: Prisma"></div>
      <div class="fg"><label>Tipo de Contrato</label><select id="f-ct">${ctOpts}</select></div>
      <div class="fg"><label style="display:flex;align-items:center;gap:6px;text-transform:none"><input type="checkbox" id="f-cap" style="width:auto;margin-right:4px">Tem captação contratada</label></div>
      <button class="hbtn pri" style="width:100%;padding:10px;margin-top:6px" onclick="submitClient()">Cadastrar Cliente</button>
    </div>`;
  } else {
    const rows=TIME_REF.map(t=>`<div class="ref-row"><div><div class="ref-svc">${t.svc}</div><div style="font-size:9px;color:var(--tx3);margin-top:2px">${t.detail}</div></div><div class="ref-time">${t.total}</div></div>`).join('');
    inner=`<div class="mbox"><div class="mtitle">Tempos de Referência <button class="xbtn" onclick="closeModal()">×</button></div>
      <div class="ref-box">${rows}</div>
      <div style="font-size:9px;color:var(--tx3);text-align:center;margin-top:4px">Configuração personalizada por cliente — em breve</div>
    </div>`;
  }
  ov.innerHTML=inner;
  ov.addEventListener('click',e=>{if(e.target===ov)closeModal();});
  host.appendChild(ov);
}
function closeModal(){const el=document.getElementById('modal-ov');if(el)el.remove();}
function setHrs(h){state.addHours=h;openModal('task');}
function submitTask(){
  const cl=document.getElementById('f-cl').value,st=document.getElementById('f-st').value;
  const mb=document.getElementById('f-mb').value,dt=document.getElementById('f-dt').value;
  const nt=document.getElementById('f-nt').value;
  if(!cl||!st||!mb||!dt){alert('Preencha os campos obrigatórios.');return;}
  state.tasks.push({id:'t'+Date.now(),clientId:cl,stage:st,memberId:mb,date:dt,hours:state.addHours,note:nt,completed:false});
  closeModal();saveToFirebase();
}
function submitClient(){
  const n=document.getElementById('f-cn').value.trim(),ct=document.getElementById('f-ct').value;
  const cap=document.getElementById('f-cap').checked;
  if(!n){alert('Informe o nome do cliente.');return;}
  state.clients.push({id:'c'+Date.now(),name:n,contractType:ct,hasCaptacao:cap});
  closeModal();saveToFirebase();
}

function saveToFirebase() {
  docRef.set({
    clients: state.clients,
    tasks: state.tasks,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  }).catch(err => console.error('Erro ao salvar:', err));
}

// Show loading state
document.getElementById('view-root').innerHTML = '<div style="padding:48px;text-align:center;color:var(--tx3);font-size:13px">Carregando pauta...</div>';
renderLegend();
renderHeader();

// Real-time sync
docRef.onSnapshot((doc) => {
  if (doc.exists) {
    const data = doc.data();
    state.clients = data.clients || [];
    state.tasks = data.tasks || [];
  }
  renderView();
}, (err) => {
  console.error('Erro de conexão:', err);
  document.getElementById('view-root').innerHTML = '<div style="padding:48px;text-align:center;color:var(--danger);font-size:13px">Erro ao conectar com o banco de dados.<br>Verifique sua conexão.</div>';
});
